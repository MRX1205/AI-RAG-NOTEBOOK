# AI - DeepSeek 大模型配置
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: 
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: 
      model-name: deepseek-chat
      max-tokens: 8192
      log-requests: true
      log-responses: true

# 百炼 DashScope Embedding 模型配置
dashscope:
  api-key:
  embedding:
    model-name: text-embedding-v3

# 文件上传配置
spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

# 文件存储路径
file:
  upload-dir: ./uploads
