spring:
  application:
    name: ai-rag
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lyhm_ai_rag
    username: root
    password: 123456
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.lyhm.airag.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# 应用自定义配置
app:
  admin-register-code: "1205"
